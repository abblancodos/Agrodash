name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITEA_TOKEN }}

      - name: Build frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend
        run: |
          docker rm -f agrodash-web-tmp 2>/dev/null || true
          docker run -d --name agrodash-web-tmp \
            -v /home/embebidos/.server-lab/agrodash/web:/output \
            alpine sleep 30
          docker cp build/. agrodash-web-tmp:/output/
          docker rm -f agrodash-web-tmp

      - name: Build API image
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: docker build -f Dockerfile.api -t agrodash-api:latest --build-arg DATABASE_URL=$DATABASE_URL .

      - name: Deploy API
        run: |
          docker rm -f agrodash-api-extract 2>/dev/null || true
          docker run -d --name agrodash-api-extract agrodash-api:latest sleep 30
          docker cp agrodash-api-extract:/app/agrodash-api ./agrodash-api
          docker rm -f agrodash-api-extract
          docker rm -f agrodash-api-tmp 2>/dev/null || true
          docker run -d --name agrodash-api-tmp \
            -v /home/embebidos/.server-lab/agrodash/api:/output \
            alpine sleep 30
          docker cp ./agrodash-api agrodash-api-tmp:/output/
          docker rm -f agrodash-api-tmp

      - name: Restart API container
        run: docker restart server-lab-api-rust-agrodash-1