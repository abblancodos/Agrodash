name: Deploy
on:
  push:
    branches: [main]

jobs:
  sqlx-prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITEA_TOKEN }}

      - name: Debug DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is EMPTY"
          else
            echo "DATABASE_URL is set, length=${#DATABASE_URL}"
          fi

      - name: cargo sqlx prepare
        working-directory: src/rust
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          cargo sqlx prepare

      - name: Commit sqlx cache si cambió
        run: |
          git config user.email "ci@agrodash"
          git config user.name "CI Bot"
          git add src/rust/.sqlx
          git diff --cached --quiet || git commit -m "chore: update sqlx cache [skip ci]"
          git push --force-with-lease

  deploy:
    runs-on: ubuntu-latest
    needs: sqlx-prepare
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Instalar dependencias frontend
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: Copiar frontend a nginx
        run: |
          sudo mkdir -p /opt/agrodash-web
          sudo rsync -a --delete build/ /opt/agrodash-web/

      - name: Build API
        working-directory: src/rust
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          source ~/.cargo/env
          cargo build --release

      - name: Copiar binario
        run: |
          sudo mkdir -p /opt/agrodash-api
          sudo cp src/rust/target/release/agrodash-api /opt/agrodash-api/agrodash-api
          sudo chmod +x /opt/agrodash-api/agrodash-api

      - name: Restart API container
        run: docker compose -f /opt/iot-server/docker-compose.yml restart agrodash-api