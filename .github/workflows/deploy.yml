name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend
        run: |
          docker rm -f agrodash-web-tmp 2>/dev/null || true
          docker run --rm \
            -v /home/embebidos/.server-lab/agrodash/web:/output \
            -v $(pwd)/build:/build:ro \
            alpine sh -c "cp -r /build/. /output/"

      - name: Build API image
        run: docker build -f Dockerfile.api -t agrodash-api:latest .

      - name: Restart API container
        run: docker restart server-lab-api-rust-agrodash-1