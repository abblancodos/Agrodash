name: Deploy
on:
  push:
    branches: [main]

jobs:
  sqlx-prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITEA_TOKEN }}

      - name: cargo sqlx prepare
        working-directory: src/rust
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          cargo sqlx prepare

      - name: Commit sqlx cache si cambió
        run: |
          git config user.email "ci@agrodash"
          git config user.name "CI Bot"
          git add src/rust/.sqlx
          git diff --cached --quiet || git commit -m "chore: update sqlx cache [skip ci]"
          git push --force-with-lease

  deploy:
    runs-on: ubuntu-latest
    needs: sqlx-prepare
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build API image
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: docker build -f Dockerfile.api -t agrodash-api:latest .

      - name: Build frontend image
        run: |
          docker build -f Dockerfile.web \
            --build-arg VITE_API_BASE=${{ secrets.VITE_API_BASE }} \
            -t agrodash-web:latest .

      - name: Restart containers
        run: |
          docker compose -f /home/embebidos/.server-lab/docker-compose.api-rust-agrodash.yml up -d --force-recreate