name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend
        run: |
          docker create --name agrodash-web-tmp alpine sh
          docker cp build/. agrodash-web-tmp:/build/
          docker cp agrodash-web-tmp:/build/. /home/embebidos/.server-lab/agrodash/web/
          docker rm agrodash-web-tmp

      - name: Build API image
        run: docker build -f Dockerfile.api -t agrodash-api:latest .

      - name: Restart API container
        run: docker restart server-lab-api-rust-agrodash-1