name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tools
        run: |
          node --version || echo "no node"
          npm --version || echo "no npm"
          docker --version || echo "no docker"

      - name: Build API image
        run: docker build -f Dockerfile.api -t agrodash-api:latest .

      - name: Deploy frontend
        run: |
          docker create --name agrodash-web-tmp agrodash-web:latest
          docker cp agrodash-web-tmp:/usr/share/nginx/html/. /home/embebidos/.server-lab/agrodash/web/
          docker rm agrodash-web-tmp

      - name: Restart containers
        run: docker restart server-lab-api-rust-agrodash-1