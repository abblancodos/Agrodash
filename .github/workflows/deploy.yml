name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend
        run: |
          docker rm -f agrodash-web-tmp 2>/dev/null || true
          docker run -d --name agrodash-web-tmp \
            -v /home/embebidos/.server-lab/agrodash/web:/output \
            alpine sleep 30
          docker cp build/. agrodash-web-tmp:/output/
          docker rm -f agrodash-web-tmp

      - name: Build API image
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: docker build -f Dockerfile.api -t agrodash-api:latest .

      - name: Deploy API
        run: |
          docker rm -f agrodash-api-tmp 2>/dev/null || true
          CONTAINER_ID=$(docker create agrodash-api:latest)
          docker run -d --name agrodash-api-tmp \
            -v /home/embebidos/.server-lab/agrodash/api:/output \
            alpine sleep 30
          docker cp $CONTAINER_ID:/app/agrodash-api agrodash-api-tmp:/output/
          docker rm $CONTAINER_ID
          docker rm -f agrodash-api-tmp

      - name: Restart API container
        run: docker restart server-lab-api-rust-agrodash-1