name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t agrodash-api:latest .

      - name: Build frontend image
        run: |
          docker build -f Dockerfile.web \
            --build-arg VITE_API_BASE=${{ secrets.VITE_API_BASE }} \
            -t agrodash-web:latest .

      - name: Restart containers
        run: |
          docker compose -f /home/embebidos/.server-lab/docker-compose.api-rust-agrodash.yml up -d --force-recreate